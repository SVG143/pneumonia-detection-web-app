services:
  api:
    build: ./backend
    env_file: .env
    ports: ["8000:8000"]
    volumes: ["./backend/media:/app/media","./model_artifacts:/app/model_artifacts"]
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
  web:
    build:
      context: ./frontend
      args: ["VITE_API_URL=http://localhost:8000/api"]
    ports: ["5174:80"]
    depends_on: [api]
